<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bandcamp Album of the Day</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 16px;
}

.card {
  text-decoration: none;
  color: black;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 4px;
}

.title {
  margin-top: 8px;
  line-height: 1.3;
}

.date {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="grid" id="albums"></div>

<script>
async function loadAlbums() {

  const rssUrl =
    "https://daily.bandcamp.com/album-of-the-day/feed";

  const proxy =
    "https://api.allorigins.win/raw?url=" +
    encodeURIComponent(rssUrl);

  const response = await fetch(proxy);
  const xmlText = await response.text();

  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, "text/xml");

  const items = [...xml.querySelectorAll("item")].slice(0, 7);

  const html = await Promise.all(items.map(async item => {

    const title = item.querySelector("title").textContent;

    const parts = title.split(" - ");

    const band = parts[0] || "";
    const album = parts[1] || "";

    const link = item.querySelector("link").textContent;

    const pubDate = new Date(
      item.querySelector("pubDate").textContent
    ).toLocaleDateString();

    let image = "";

    try {

      const articleProxy =
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent(link);

      const articleHtml =
        await fetch(articleProxy).then(r => r.text());

      const match =
        articleHtml.match(/property="og:image"\s+content="([^"]+)"/);

      if (match) image = match[1];

    } catch(e) {}

    return `
      <a class="card" href="${link}" target="_blank">
        <img src="${image}">
        <div class="title">
          ${band} — <em>${album}</em>
        </div>
        <div class="date">${pubDate}</div>
      </a>
    `;

  }));

  document.getElementById("albums").innerHTML =
    html.join("");

}

loadAlbums();
</script>

</body>
</html>
