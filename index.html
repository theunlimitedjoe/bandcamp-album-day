<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bandcamp Album of the Day</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 16px;
}

.card {
  text-decoration: none;
  color: black;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 4px;
}

.title {
  margin-top: 8px;
  line-height: 1.3;
}

.date {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="grid" id="albums"></div>

<script>
async function loadAlbums() {
  const grid = document.getElementById("albums");
  grid.innerHTML = "Loading albums...";

  try {
    const sourceUrl = "https://daily.bandcamp.com/album-of-the-day";

    const proxy =
      "https://api.allorigins.win/raw?url=" +
      encodeURIComponent(sourceUrl);

    const page = await fetch(proxy).then(r => r.text());

    const regex =
      /ALBUM OF THE DAY\s*·\s*([^<]+)[\s\S]*?<a[^>]+href="([^"]+)"[^>]*>\s*([^<]+),\s*“([^”]+)”/g;

    const albums = [];
    let match;

    while ((match = regex.exec(page)) && albums.length < 7) {
      albums.push({
        date: match[1].trim(),
        link: match[2].startsWith("http")
          ? match[2]
          : "https://daily.bandcamp.com" + match[2],
        band: match[3].trim(),
        album: match[4].trim()
      });
    }

    const html = await Promise.all(albums.map(async item => {
      let image = "";

      try {
        const articleProxy =
          "https://api.allorigins.win/raw?url=" +
          encodeURIComponent(item.link);

        const articleHtml =
          await fetch(articleProxy).then(r => r.text());

        const imgMatch =
          articleHtml.match(/property="og:image"\s+content="([^"]+)"/);

        if (imgMatch) image = imgMatch[1];
      } catch(e) {}

      return `
        <a class="card" href="${item.link}" target="_blank">
          <img src="${image}" alt="${item.band} - ${item.album}">
          <div class="title">
            ${item.band} — <em>${item.album}</em>
          </div>
          <div class="date">${item.date}</div>
        </a>
      `;
    }));

    grid.innerHTML = html.join("");

    if (!albums.length) {
      grid.innerHTML = "No albums found. Bandcamp may have changed the page layout.";
    }

  } catch (error) {
    grid.innerHTML = "Could not load albums.";
    console.error(error);
  }
}

loadAlbums();
</script>

</body>
</html>
